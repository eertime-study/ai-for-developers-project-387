name: e2e

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            spec/package-lock.json
            backend/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Install spec deps & compile TypeSpec
        run: npm ci --prefix spec && npm run --prefix spec compile

      - name: Install backend deps & generate API types
        run: npm ci --prefix backend && npm run --prefix backend gen:api

      - name: Install frontend deps & generate API types
        run: npm ci --prefix frontend --legacy-peer-deps && npm run --prefix frontend gen:api

      - name: Install e2e deps
        run: npm ci --prefix e2e

      - name: Build backend
        run: npm run --prefix backend build

      - name: Build frontend
        run: npm run --prefix frontend build

      - name: Install Playwright Chromium
        run: npx --prefix e2e playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm test --prefix e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 7
